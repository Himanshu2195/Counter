<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHREE RADHA</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        
        h1 {
            margin-bottom: 20px;
        }
        
        #counter {
            font-size: 48px;
            margin: 20px 0;
        }
        
        .button-container {
            display: flex;
            justify-content: space-between;
            width: 300px;
            margin-top: 20px;
        }
        
        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            touch-action: manipulation;
        }
        
        button:last-child {
            background-color: #f44336;
        }
        
        .footer-credit {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 14px;
            color: black;
            font-style: italic;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 36px;
                margin-bottom: 30px;
            }
            
            #counter {
                font-size: 72px;
                margin: 30px 0;
            }
            
            .button-container {
                width: 90%;
                max-width: 400px;
            }
            
            button {
                padding: 15px 30px;
                font-size: 24px;
            }
            
            .footer-credit {
                font-size: 12px;
                bottom: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>
    <h1>SHREE RADHA</h1>
    <p id="counter">0</p>
    <div class="button-container">
        <button onclick="increment()">Count</button>
        <button onclick="reset()">Reset</button>
    </div>

    <script>
        let count = 0;

        function increment() {
            count++;
            document.getElementById('counter').textContent = count;
        }

        function reset() {
            count = 0;
            document.getElementById('counter').textContent = count;
        }
    </script>
    
    <div class="footer-credit">Created by Himanshu Tanwar</div>
</html>
