<html>
<head>
    <meta charset="UTF-8">
    <title>SHREE RADHA</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        
        h1 {
            margin-bottom: 20px;
        }
        
        #counter {
            font-size: 48px;
            margin: 20px 0;
        }
        
        .button-container {
            display: flex;
            justify-content: space-between;
            width: 300px;
            margin-top: 20px;
        }
        
        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        
        button:last-child {
            background-color: #f44336;
        }
    </style>
</head>
<body>
    <h1>SHREE RADHA</h1>
    <p id="counter">0</p>
    <div class="button-container">
        <button onclick="increment()">Count</button>
        <button onclick="reset()">Reset</button>
    </div>

    <script>
        let count = 0;

        function increment() {
            count++;
            document.getElementById('counter').textContent = count;
        }

        function reset() {
            count = 0;
            document.getElementById('counter').textContent = count;
        }
    </script>
     <div class="footer-credit">Created by Himanshu Tanwar</div>
</html>
